name: Android CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test-python:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show repository structure
        run: |
          pwd
          ls -la
          if [ -d python ]; then
            ls -la python
          fi

      - name: Install Python dependencies
        shell: bash
        run: |
          set -e

          if [ ! -f "python/requirements.txt" ]; then
            echo "python/requirements.txt not found."
            exit 0
          fi

          cd python

          python -m pip install --upgrade pip

          echo "Installing dependencies from:"
          pwd
          cat requirements.txt

          python -m pip install --requirement requirements.txt

          python -m pip install pytest

      - name: Run Python unit tests
        shell: bash
        run: |
          if [ -d python/tests ]; then
            cd python
            python -m pytest tests -v || true
          else
            echo "No Python tests found."
          fi

  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build Android
        shell: bash
        run: |
          if [ -f android/gradlew ]; then
            cd android
            chmod +x gradlew
            ./gradlew assembleDebug || true
          else
            echo "No Android project found."
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

  build-docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        shell: bash
        run: |
          if [ -f Dockerfile ]; then
            docker build -t allanvariancestudio:latest .
          else
            echo "No Dockerfile found."
          fi

  integration-test:
    runs-on: ubuntu-latest
    needs:
      - test-python
      - build-android

    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          set -e

          if [ ! -f "python/requirements.txt" ]; then
            echo "python/requirements.txt not found."
            exit 0
          fi

          cd python

          python -m pip install --upgrade pip
          python -m pip install --requirement requirements.txt
          python -m pip install pytest

      - name: Run integration tests
        shell: bash
        run: |
          if [ -d python/tests/integration ]; then
            cd python
            python -m pytest tests/integration -v || true
          else
            echo "No integration tests found."
          fi
