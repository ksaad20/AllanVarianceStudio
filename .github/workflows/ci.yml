name: Android CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          if [ -d "python" ] && [ -f "python/requirements.txt" ]; then
            cd python
            pip install -r requirements.txt
            pip install pytest
          else
            echo "No Python requirements found, skipping tests"
            exit 0
          fi

      - name: Run Python unit tests
        run: |
          if [ -d "python/tests" ]; then
            cd python
            pytest tests/ -v || true
          else
            echo "No tests found, skipping"
          fi

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: |
          if [ -f "android/gradlew" ]; then
            chmod +x android/gradlew
          else
            echo "No gradlew found, cannot build Android"
            exit 0
          fi

      - name: Build debug APK
        run: |
          if [ -f "android/gradlew" ]; then
            cd android
            ./gradlew assembleDebug || true
          else
            echo "No gradlew available, skipping Android build"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          if-no-files-found: warn

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          if [ -f "Dockerfile" ]; then
            docker build -t allanvariancestudio:latest .
          else
            echo "No Dockerfile found, skipping Docker build"
            exit 0
          fi

  integration-test:
    runs-on: ubuntu-latest
    needs: [test-python, build-android]
    if: ${{ github.ref == 'refs/heads/main' || github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          if [ -d "python" ] && [ -f "python/requirements.txt" ]; then
            cd python
            pip install -r requirements.txt
            pip install pytest
          else
            echo "No Python requirements found, skipping integration tests"
            exit 0
          fi

      - name: Run integration tests
        run: |
          if [ -d "python/tests/integration" ]; then
            cd python
            pytest tests/integration/ -v
          else
            echo "No integration tests found, skipping"
          fi
