name: Android CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  test-python:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Display repository structure
        run: |
          pwd
          ls -la
          find . -maxdepth 2 -type f | sort

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euxo pipefail

          python -m pip install --upgrade pip

          if [ -f "python/requirements.txt" ]; then
            python -m pip install -r python/requirements.txt
          else
            echo "No python/requirements.txt found."
          fi

          python -m pip install pytest

      - name: Run Python unit tests
        shell: bash
        run: |
          if [ -d "python/tests" ]; then
            python -m pytest python/tests -v || true
          else
            echo "No Python tests found."
          fi

  build-android:
    name: Android Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build APK
        shell: bash
        run: |
          if [ -f "android/gradlew" ]; then
            cd android
            chmod +x gradlew
            ./gradlew assembleDebug --stacktrace || true
          else
            echo "No Android project found."
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

  build-docker:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        shell: bash
        run: |
          if [ -f Dockerfile ]; then
            docker build \
              --pull \
              --no-cache \
              --progress=plain \
              -t allanvariancestudio:latest .
          else
            echo "Dockerfile not found."
          fi

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest

    needs:
      - test-python
      - build-android

    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail

          python -m pip install --upgrade pip

          if [ -f "python/requirements.txt" ]; then
            python -m pip install -r python/requirements.txt
          else
            echo "No python/requirements.txt found."
          fi

          python -m pip install pytest

      - name: Run integration tests
        shell: bash
        run: |
          if [ -d "python/tests/integration" ]; then
            python -m pytest python/tests/integration -v || true
          else
            echo "No integration tests found."
          fi
