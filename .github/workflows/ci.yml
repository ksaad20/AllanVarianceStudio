
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python linting tools
        run: |
          pip install black flake8 isort

      - name: Lint Python code
        run: |
          if [ -d "python" ]; then
            black --check python/ || true
            flake8 python/ --max-line-length=100 --extend-ignore=E203 || true
            isort --check-only python/ || true
          else
            echo "No python directory found, skipping Python lint"
          fi

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Setup Gradle wrapper
        run: |
          if [ ! -f "android/gradlew" ]; then
            echo "Creating minimal gradlew for CI..."
            mkdir -p android/gradle/wrapper
            cat > android/gradlew << 'GRADLEW_EOF'
          #!/bin/sh
          set -e
          GRADLE_VERSION=7.6
          GRADLE_URL="https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
          GRADLE_USER_HOME="${GRADLE_USER_HOME:-$HOME/.gradle}"
          GRADLE_DIR="$GRADLE_USER_HOME/wrapper/dists/gradle-${GRADLE_VERSION}-bin"
          if [ ! -d "$GRADLE_DIR" ]; then
            echo "Downloading Gradle ${GRADLE_VERSION}..."
            mkdir -p "$GRADLE_DIR"
            curl -L "$GRADLE_URL" -o /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d "$GRADLE_DIR"
            rm /tmp/gradle.zip
          fi
          GRADLE_BIN=$(find "$GRADLE_DIR" -name "gradle" -type f | head -1)
          if [ -z "$GRADLE_BIN" ]; then
            GRADLE_BIN="$GRADLE_DIR/gradle-${GRADLE_VERSION}/bin/gradle"
          fi
          exec "$GRADLE_BIN" "$@"
          GRADLEW_EOF
            chmod +x android/gradlew
            cat > android/gradle/wrapper/gradle-wrapper.properties << 'PROPS_EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.6-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          PROPS_EOF
          fi

      - name: Make gradlew executable
        run: |
          if [ -f "android/gradlew" ]; then
            chmod +x android/gradlew
          else
            echo "No gradlew found, skipping Android lint"
            exit 0
          fi

      - name: Run Android lint
        run: |
          if [ -f "android/gradlew" ]; then
            cd android
            ./gradlew lintDebug || true
          else
            echo "No gradlew available, skipping Android lint"
          fi

  test-python:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          if [ -d "python" ] && [ -f "python/requirements.txt" ]; then
            cd python
            pip install -r requirements.txt
            pip install pytest pytest-cov
          else
            echo "No Python requirements found, skipping Python tests"
            exit 0
          fi

      - name: Run Python tests
        run: |
          if [ -d "python/tests" ]; then
            cd python
            pytest tests/ --cov=. --cov-report=xml || true
          else
            echo "No Python tests found, skipping"
          fi

      - name: Upload coverage
        if: hashFiles('python/coverage.xml') != ''
        uses: codecov/codecov-action@v4
        with:
          files: ./python/coverage.xml
          fail_ci_if_error: false

  build-android:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Setup Gradle wrapper
        run: |
          if [ ! -f "android/gradlew" ]; then
            echo "Creating minimal gradlew for CI..."
            mkdir -p android/gradle/wrapper
            cat > android/gradlew << 'GRADLEW_EOF'
          #!/bin/sh
          set -e
          GRADLE_VERSION=7.6
          GRADLE_URL="https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
          GRADLE_USER_HOME="${GRADLE_USER_HOME:-$HOME/.gradle}"
          GRADLE_DIR="$GRADLE_USER_HOME/wrapper/dists/gradle-${GRADLE_VERSION}-bin"
          if [ ! -d "$GRADLE_DIR" ]; then
            echo "Downloading Gradle ${GRADLE_VERSION}..."
            mkdir -p "$GRADLE_DIR"
            curl -L "$GRADLE_URL" -o /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d "$GRADLE_DIR"
            rm /tmp/gradle.zip
          fi
          GRADLE_BIN=$(find "$GRADLE_DIR" -name "gradle" -type f | head -1)
          if [ -z "$GRADLE_BIN" ]; then
            GRADLE_BIN="$GRADLE_DIR/gradle-${GRADLE_VERSION}/bin/gradle"
          fi
          exec "$GRADLE_BIN" "$@"
          GRADLEW_EOF
            chmod +x android/gradlew
            cat > android/gradle/wrapper/gradle-wrapper.properties << 'PROPS_EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.6-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          PROPS_EOF
          fi

      - name: Make gradlew executable
        run: |
          if [ -f "android/gradlew" ]; then
            chmod +x android/gradlew
          else
            echo "No gradlew found, cannot build Android"
            exit 0
          fi

      - name: Build debug APK
        run: |
          if [ -f "android/gradlew" ]; then
            cd android
            ./gradlew assembleDebug || true
          else
            echo "No gradlew available, skipping Android build"
          fi

      - name: Upload APK artifact
        if: hashFiles('android/app/build/outputs/apk/debug/app-debug.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  integration-test:
    runs-on: ubuntu-latest
    needs: [test-python, build-android]
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          if [ -d "python" ] && [ -f "python/requirements.txt" ]; then
            cd python
            pip install -r requirements.txt
            pip install pytest
          else
            echo "No Python requirements found, skipping integration tests"
            exit 0
          fi

      - name: Run integration tests
        run: |
          if [ -d "python/tests/integration" ]; then
            cd python
            pytest tests/integration/ -v
          else
            echo "No integration tests found, skipping"
          fi
