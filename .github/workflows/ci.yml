name: AllanVarianceStudio CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:

  android-build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Check Android files
        run: |
          echo "Repository:"
          ls -la

          echo "Android directory:"
          ls -la android

          test -f android/gradlew
          test -f android/settings.gradle
          test -f android/build.gradle
          test -f android/app/build.gradle

      - name: Show Gradle configuration
        working-directory: android
        run: |
          echo "Gradle wrapper:"
          cat gradle/wrapper/gradle-wrapper.properties

          echo "Gradle version:"
          chmod +x gradlew
          ./gradlew --version

      - name: List Gradle tasks
        working-directory: android
        run: |
          ./gradlew tasks --all

      - name: Build Debug APK
        working-directory: android
        run: |
          ./gradlew assembleDebug --stacktrace --info

      - name: Verify APK
        run: |
          APK="android/app/build/outputs/apk/debug/app-debug.apk"

          if [ ! -f "$APK" ]; then
            echo "APK was not created"
            exit 1
          fi

          echo "APK details:"
          ls -lh "$APK"

          SIZE=$(stat -c%s "$APK")

          if [ "$SIZE" -lt 100000 ]; then
            echo "APK is suspiciously small: ${SIZE} bytes"
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AllanVarianceStudio-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk


  python-test:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: python
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Run tests
        working-directory: python
        run: |
          pytest -v


  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          if [ -f Dockerfile ]; then
            docker build -t allanvariancestudio .
          else
            echo "No Dockerfile found. Skipping."
          fi
