name: AllanVarianceStudio CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:

  python-test:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: python
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Run tests
        working-directory: python
        run: |
          pytest -v


  android-build:
    name: Android APK Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Verify Android project
        run: |
          test -f android/gradlew
          test -f android/settings.gradle
          test -f android/app/build.gradle

      - name: Check Gradle version
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew --version

      - name: Build Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Verify APK
        run: |
          APK="android/app/build/outputs/apk/debug/app-debug.apk"

          if [ ! -f "$APK" ]; then
            echo "APK not found"
            exit 1
          fi

          ls -lh "$APK"

          SIZE=$(stat -c%s "$APK")

          if [ "$SIZE" -lt 10000 ]; then
            echo "APK is too small: $SIZE bytes"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AllanVarianceStudio-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk


  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          if [ -f Dockerfile ]; then
            docker build -t allanvariancestudio .
          else
            echo "No Dockerfile found, skipping."
          fi
