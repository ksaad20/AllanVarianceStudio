name: Android CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-python:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          if [ -f "python/requirements.txt" ]; then
            cd python
            python -m pip install --upgrade pip
            python -m pip install -r requirements.txt
            python -m pip install pytest
          else
            echo "No python/requirements.txt found. Skipping Python dependency installation."
          fi

      - name: Run Python unit tests
        run: |
          if [ -d "python/tests" ]; then
            cd python
            python -m pytest tests/ -v || true
          else
            echo "No Python tests found. Skipping."
          fi

  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Make gradlew executable
        run: |
          if [ -f "android/gradlew" ]; then
            chmod +x android/gradlew
          else
            echo "No gradlew found. Skipping Android build."
          fi

      - name: Build debug APK
        run: |
          if [ -f "android/gradlew" ]; then
            cd android
            ./gradlew assembleDebug || true
          else
            echo "Skipping Android build."
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          if-no-files-found: warn

  build-docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          if [ -f "Dockerfile" ]; then
            docker build -t allanvariancestudio:latest .
          else
            echo "No Dockerfile found. Skipping Docker build."
          fi

  integration-test:
    runs-on: ubuntu-latest
    needs:
      - test-python
      - build-android
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          if [ -f "python/requirements.txt" ]; then
            cd python
            python -m pip install --upgrade pip
            python -m pip install -r requirements.txt
            python -m pip install pytest
          else
            echo "No python/requirements.txt found. Skipping dependency installation."
          fi

      - name: Run integration tests
        run: |
          if [ -d "python/tests/integration" ]; then
            cd python
            python -m pytest tests/integration/ -v || true
          else
            echo "No integration tests found. Skipping."
          fi
