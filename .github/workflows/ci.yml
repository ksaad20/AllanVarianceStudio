name: AllanVarianceStudio CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read


jobs:

  python-test:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        working-directory: python
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

          python -m pip install pytest

      - name: Display Python structure
        run: |
          find python -maxdepth 4 -type f | sort

      - name: Run Python tests
        working-directory: python
        env:
          PYTHONPATH: .
        run: |
          pytest -v


  android-build:
    name: Android APK Build
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"


      - name: Verify Android project
        run: |
          test -f android/gradlew
          test -f android/settings.gradle
          test -f android/build.gradle
          test -f android/app/build.gradle

          echo "Android project detected"


      - name: Check Gradle wrapper
        working-directory: android
        run: |
          chmod +x gradlew

          echo "Gradle wrapper configuration:"
          cat gradle/wrapper/gradle-wrapper.properties

          echo "Gradle version:"
          ./gradlew --version


      - name: List Gradle tasks
        working-directory: android
        run: |
          ./gradlew tasks --all


      - name: Build Debug APK
        working-directory: android
        run: |
          rm -f app/build/outputs/apk/debug/app-debug.apk

          ./gradlew clean

          ./gradlew assembleDebug --stacktrace --info


      - name: Verify APK
        run: |
          APK="android/app/build/outputs/apk/debug/app-debug.apk"

          if [ ! -f "$APK" ]; then
            echo "APK was not generated"
            exit 1
          fi

          echo "APK information:"
          ls -lh "$APK"

          SIZE=$(stat -c%s "$APK")

          if [ "$SIZE" -lt 100000 ]; then
            echo "APK is invalid. Size: ${SIZE} bytes"
            exit 1
          fi

          file "$APK"


      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AllanVarianceStudio-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error


  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Build Docker image
        run: |
          if [ -f Dockerfile ]; then
            docker build -t allanvariancestudio .
          else
            echo "Dockerfile not found. Skipping."
          fi
