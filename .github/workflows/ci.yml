name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python linting tools
        run: |
          pip install black flake8 isort

      - name: Lint Python code
        run: |
          if [ -d "python" ]; then
            black --check python/ || true
            flake8 python/ --max-line-length=100 --extend-ignore=E203 || true
            isort --check-only python/ || true
          else
            echo "No python directory found, skipping Python lint"
          fi

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Run Android lint
        run: |
          cd android
          ./gradlew lintDebug

  test-python:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          if [ -d "python" ]; then
            cd python
            pip install -r requirements.txt
            pip install pytest pytest-cov
          else
            echo "No python directory found, skipping Python tests"
            exit 0
          fi

      - name: Run Python tests
        run: |
          if [ -d "python" ]; then
            cd python
            pytest tests/ --cov=. --cov-report=xml || true
          fi

      - name: Upload coverage
        if: hashFiles('python/coverage.xml') != ''
        uses: codecov/codecov-action@v4
        with:
          files: ./python/coverage.xml
          fail_ci_if_error: false

  build-android:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  integration-test:
    runs-on: ubuntu-latest
    needs: [test-python, build-android]
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          if [ -d "python" ]; then
            cd python
            pip install -r requirements.txt
            pip install pytest
          else
            echo "No python directory found, skipping integration tests"
            exit 0
          fi

      - name: Run integration tests
        run: |
          if [ -d "python/tests/integration" ]; then
            cd python
            pytest tests/integration/ -v
          else
            echo "No integration tests found, skipping"
          fi
