name: Android CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Verify all required files exist
        run: |
          echo "=== Repo root ==="
          ls -la
          echo "=== android/ directory ==="
          ls -la android/
          echo "=== android/app/src/main/ ==="
          ls -R android/app/src/main/ 2>/dev/null || echo "src/main/ MISSING"
          echo "=== gradlew check ==="
          ls -la android/gradlew
          file android/gradlew
          echo "=== settings.gradle ==="
          cat android/settings.gradle
          echo "=== app build.gradle ==="
          cat android/app/build.gradle

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK (will fail if error)
        working-directory: ./android
        run: |
          ./gradlew clean
          ./gradlew assembleDebug --stacktrace --info
        shell: bash

      - name: Verify APK was created
        if: always()
        run: |
          echo "=== Search for APK ==="
          find android -name "*.apk" -type f -exec ls -lh {} \; 2>/dev/null || echo "NO APK FOUND"
          echo "=== Build outputs ==="
          ls -lhR android/app/build/outputs/ 2>/dev/null || echo "No outputs dir"

      - name: Upload APK
        uses: actions/upload-artifact@v7
        if: success()
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
