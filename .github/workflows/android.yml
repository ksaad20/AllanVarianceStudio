name: Android CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:

    name: Build Android APK

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle


      - name: Verify Android project
        shell: bash
        run: |
          set -e

          if [ ! -d "android" ]; then
            echo "Android directory missing"
            exit 1
          fi

          if [ ! -f "android/gradlew" ]; then
            echo "Gradle wrapper missing"
            exit 1
          fi

          if [ ! -f "android/settings.gradle" ]; then
            echo "settings.gradle missing"
            exit 1
          fi

          if [ ! -f "android/app/build.gradle" ]; then
            echo "app/build.gradle missing"
            exit 1
          fi

          echo "Android project verified"


      - name: Check Gradle version
        working-directory: android
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew --version


      - name: Show Gradle tasks
        working-directory: android
        shell: bash
        run: |
          ./gradlew tasks --all


      - name: Build Debug APK
        working-directory: android
        shell: bash
        run: |
          chmod +x gradlew

          rm -f app/build/outputs/apk/debug/app-debug.apk

          ./gradlew clean

          ./gradlew assembleDebug --stacktrace


      - name: Validate APK
        shell: bash
        run: |
          APK="android/app/build/outputs/apk/debug/app-debug.apk"

          if [ ! -f "$APK" ]; then
            echo "APK was not generated"
            exit 1
          fi

          SIZE=$(stat -c%s "$APK")

          echo "APK size: ${SIZE} bytes"

          if [ "$SIZE" -lt 100000 ]; then
            echo "Invalid APK detected"
            exit 1
          fi

          file "$APK"
          ls -lh "$APK"


      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AllanVarianceStudio-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
