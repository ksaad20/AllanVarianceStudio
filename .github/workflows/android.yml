name: Android CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Verify files exist
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== Listing all files in android/ ==="
          ls -la
          echo "=== Checking gradlew ==="
          ls -la gradlew
          echo "=== Checking settings.gradle ==="
          cat settings.gradle
          echo "=== Checking root build.gradle ==="
          cat build.gradle
          echo "=== Checking app/build.gradle ==="
          cat app/build.gradle
          echo "=== Checking wrapper properties ==="
          cat gradle/wrapper/gradle-wrapper.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK (with full output)
        run: |
          ./gradlew assembleDebug --stacktrace --info --console=plain 2>&1
        shell: bash

      - name: Verify APK exists
        if: always()
        run: |
          echo "=== Searching for APK ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "NO APK FOUND"
          echo "=== Build outputs ==="
          ls -R app/build/outputs/ 2>/dev/null || echo "No outputs directory"

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
