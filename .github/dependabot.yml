version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    groups:
      patch-updates:
        patterns:
          - "*"
        update-types:
          - "patch"
      minor-updates:
        patterns:
          - "*"
        update-types:
          - "minor"
        exclude-patterns:
          - "numpy"
          - "scipy"
          - "matplotlib"
          - "pandas"
      scientific-core:
        patterns:
          - "numpy"
          - "scipy"
          - "matplotlib"
          - "pandas"
        update-types:
          - "minor"
          - "patch"
      dev-tools:
        patterns:
          - "pytest*"
          - "black"
          - "flake8"
          - "mypy"
          - "isort"
          - "pre-commit"
          - "coverage"
        update-types:
          - "minor"
          - "patch"
      docs:
        patterns:
          - "sphinx*"
          - "mkdocs*"
          - "myst-parser"
          - "furo"
        update-types:
          - "minor"
          - "patch"
      security-updates:
        applies-to: "security-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "numpy"
        versions: ["1.25.0", "1.25.1"]
      - dependency-name: "matplotlib"
        update-types: ["version-update:semver-major"]
      - dependency-name: "scipy"
        update-types: ["version-update:semver-major"]
      - dependency-name: "pandas"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "deps"
      prefix-development: "deps(dev)"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      actions-security:
        applies-to: "security-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "ci"
      include: "scope"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
    # Removed invalid ignore block for Docker.
    # The docker-minor-patch group already limits to minor/patch updates.
    # For pre-release tags (rc, beta, alpha), rely on manual review or 
    # add specific image name ignores if needed.
    groups:
      docker-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "docker"
      include: "scope"
